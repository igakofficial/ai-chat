<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e12;
    --surface: #16161c;
    --surface2: #1e1e26;
    --border: #2a2a35;
    --accent: #c8a8ff;
    --accent2: #ff8fb5;
    --text: #e8e8f0;
    --text-muted: #7a7a90;
    --user-bubble: #2a2240;
    --ai-bubble: #1a1a24;
    --narrator-bg: #12141a;
    --font: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    --alert: #ff6b6b;
    --warn: #fbbf24;
    --ok: #4ade80;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--font); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* ===== SETUP ===== */
  #setup-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:24px; gap:20px; }
  #setup-screen h1 { font-size:1.5rem; font-weight:300; letter-spacing:0.2em; color:var(--accent); }
  #setup-screen p { font-size:0.82rem; color:var(--text-muted); text-align:center; line-height:1.7; }
  .setup-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; width:100%; max-width:400px; display:flex; flex-direction:column; gap:12px; }
  .field-label { font-size:0.73rem; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase; }
  .setup-card input { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; color:var(--text); font-family:var(--font); font-size:0.9rem; outline:none; transition:border-color 0.2s; width:100%; }
  .setup-card input:focus { border-color:var(--accent); }
  .setup-card input::placeholder { color:var(--text-muted); }
  .api-note { font-size:0.71rem; color:var(--text-muted); line-height:1.65; }
  .api-note a { color:var(--accent); text-decoration:none; }
  .err-msg { font-size:0.78rem; color:var(--alert); display:none; }
  .err-msg.show { display:block; }
  .btn-start { background:linear-gradient(135deg,#8b5cf6,#c084fc); color:#fff; border:none; border-radius:10px; padding:13px; font-family:var(--font); font-size:0.95rem; font-weight:500; letter-spacing:0.1em; cursor:pointer; transition:opacity 0.2s,transform 0.1s; width:100%; max-width:400px; }
  .btn-start:hover { opacity:0.85; }
  .btn-start:active { transform:scale(0.98); }

  /* ===== APP ===== */
  #app { display:none; flex-direction:column; height:100vh; }

  /* header */
  #header { background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 14px; height:54px; gap:10px; flex-shrink:0; }
  #header-avatar { width:34px; height:34px; border-radius:50%; border:2px solid var(--accent); background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; overflow:hidden; }
  #header-avatar img { width:34px; height:34px; border-radius:50%; object-fit:cover; }
  #header-name { font-size:0.93rem; font-weight:500; }
  #header-status { font-size:0.68rem; color:var(--text-muted); display:flex; align-items:center; gap:4px; }
  #header-status::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--ok); display:inline-block; }
  .header-spacer { flex:1; }
  .hdr-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); font-family:var(--font); font-size:0.71rem; padding:5px 10px; cursor:pointer; transition:border-color 0.2s,color 0.2s; white-space:nowrap; }
  .hdr-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* cost panel */
  #cost-panel { display:none; background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px; flex-shrink:0; }
  #cost-panel.open { display:block; }
  .cost-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .cost-title { font-size:0.75rem; color:var(--text-muted); letter-spacing:0.08em; text-transform:uppercase; }
  .cost-amount { font-size:1.1rem; font-weight:500; color:var(--text); }
  .cost-amount span { font-size:0.7rem; color:var(--text-muted); font-weight:400; }
  .cost-bar-wrap { background:var(--surface2); border-radius:6px; height:8px; overflow:hidden; position:relative; }
  .cost-bar { height:100%; border-radius:6px; transition:width 0.4s ease, background 0.4s ease; }
  .cost-bar.ok   { background:linear-gradient(90deg,#8b5cf6,#c084fc); }
  .cost-bar.warn { background:linear-gradient(90deg,#f59e0b,#fbbf24); }
  .cost-bar.over { background:linear-gradient(90deg,#ef4444,#ff6b6b); }
  .cost-labels { display:flex; justify-content:space-between; margin-top:5px; font-size:0.67rem; color:var(--text-muted); }
  .cost-alert { margin-top:8px; font-size:0.75rem; color:var(--alert); display:none; }
  .cost-alert.show { display:block; }
  .cost-reset { font-size:0.68rem; color:var(--text-muted); cursor:pointer; text-decoration:underline; float:right; margin-top:4px; }

  /* char switcher */
  #char-switcher { display:none; background:var(--surface); border-bottom:1px solid var(--border); padding:10px 16px; gap:16px; flex-direction:row; overflow-x:auto; flex-shrink:0; }
  #char-switcher.open { display:flex; }
  .char-chip { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; opacity:0.45; transition:opacity 0.2s; flex-shrink:0; }
  .char-chip.active { opacity:1; }
  .char-chip .chip-av { width:42px; height:42px; border-radius:50%; border:2px solid transparent; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:1.3rem; transition:border-color 0.2s; overflow:hidden; }
  .char-chip .chip-av img { width:100%; height:100%; object-fit:cover; }
  .char-chip.active .chip-av { border-color:var(--accent); }
  .char-chip span { font-size:0.68rem; color:var(--text-muted); white-space:nowrap; }

  /* messages */
  #messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }
  #messages::-webkit-scrollbar { width:4px; }
  #messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg { display:flex; gap:8px; max-width:82%; animation:fadeUp 0.22s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg.ai   { align-self:flex-start; }

  .msg-av { width:30px; height:30px; border-radius:50%; flex-shrink:0; border:1.5px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:0.9rem; overflow:hidden; }
  .msg-av img { width:30px; height:30px; border-radius:50%; object-fit:cover; }
  .msg-inner { display:flex; flex-direction:column; gap:3px; }
  .msg-name { font-size:0.67rem; color:var(--accent); font-weight:500; }
  .msg.user .msg-name { color:var(--text-muted); text-align:right; }

  .msg-bubble { background:var(--ai-bubble); border:1px solid var(--border); border-radius:13px; padding:9px 13px; font-size:0.87rem; line-height:1.8; color:var(--text); word-break:break-word; }
  .msg.user .msg-bubble { background:var(--user-bubble); border-color:#3a3060; }

  /* emotion / action text styled with * * */
  .emote { color:#a78bda; font-style:italic; font-size:0.83rem; }

  /* narrator message */
  .msg.narrator { align-self:center; max-width:90%; }
  .msg.narrator .msg-bubble {
    background:transparent; border:none;
    border-top:1px solid var(--border); border-bottom:1px solid var(--border);
    border-radius:0; text-align:center;
    color:var(--text-muted); font-size:0.8rem; font-style:italic;
    padding:8px 16px; line-height:1.75;
  }

  /* typing */
  #typing { display:none; align-self:flex-start; padding:10px 14px; background:var(--ai-bubble); border:1px solid var(--border); border-radius:13px; gap:5px; }
  #typing.show { display:flex; }
  #typing span { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:bounce 1s infinite; }
  #typing span:nth-child(2){animation-delay:0.15s}
  #typing span:nth-child(3){animation-delay:0.3s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* input area */
  #input-wrap { background:var(--surface); border-top:1px solid var(--border); flex-shrink:0; }
  #input-toolbar { display:flex; gap:6px; padding:8px 14px 4px; }
  .tool-btn { background:var(--surface2); border:1px solid var(--border); border-radius:7px; color:var(--text-muted); font-family:var(--font); font-size:0.78rem; padding:4px 10px; cursor:pointer; transition:border-color 0.2s,color 0.2s; }
  .tool-btn:hover { border-color:var(--accent); color:var(--accent); }
  .tool-btn.narrator-btn { border-color:#3d3060; color:#9b7fd4; }
  .tool-btn.narrator-btn:hover { border-color:var(--accent); color:var(--accent); }
  #input-area { padding:4px 14px 10px; display:flex; gap:8px; align-items:flex-end; }
  #msg-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:11px; padding:9px 13px; color:var(--text); font-family:var(--font); font-size:0.88rem; outline:none; resize:none; line-height:1.5; max-height:120px; transition:border-color 0.2s; overflow-y:auto; }
  #msg-input:focus { border-color:var(--accent); }
  #msg-input::placeholder { color:var(--text-muted); }
  #send-btn { background:linear-gradient(135deg,#8b5cf6,#c084fc); border:none; border-radius:9px; width:40px; height:40px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity 0.2s,transform 0.1s; flex-shrink:0; }
  #send-btn:hover { opacity:0.85; }
  #send-btn:active { transform:scale(0.93); }
  #send-btn svg { width:17px; height:17px; fill:#fff; }

  /* toast */
  #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(12px); background:#1e1e26; border:1px solid var(--border); border-radius:9px; padding:9px 18px; font-size:0.8rem; color:var(--text-muted); opacity:0; transition:opacity 0.3s,transform 0.3s; pointer-events:none; z-index:100; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ===== SETUP ===== -->
<div id="setup-screen">
  <h1>✦ AI Chat</h1>
  <p>始める前に名前とAPIキーを入力してください</p>
  <div class="setup-card">
    <div class="field-label">あなたの名前</div>
    <input type="text" id="player-name" placeholder="主人公" maxlength="20">
    <div class="field-label">Anthropic API Key</div>
    <input type="password" id="api-key" placeholder="sk-ant-…">
    <div class="api-note">
      APIキーはこの端末内にのみ保存されます。<br>
      キーは <a href="https://console.anthropic.com/" target="_blank">console.anthropic.com</a> で取得できます。
    </div>
  </div>
  <span class="err-msg" id="err-msg">名前とAPIキーを両方入力してください</span>
  <button class="btn-start" onclick="startApp()">✦ はじめる</button>
</div>

<!-- ===== APP ===== -->
<div id="app">

  <div id="header">
    <div id="header-avatar"></div>
    <div>
      <div id="header-name"></div>
      <div id="header-status">オンライン</div>
    </div>
    <div class="header-spacer"></div>
    <button class="hdr-btn" onclick="toggleCost()" title="今月の概算使用量">💰 使用量</button>
    <button class="hdr-btn" onclick="toggleSwitcher()">キャラ切替</button>
    <button class="hdr-btn" onclick="clearChat()">履歴削除</button>
  </div>

  <!-- cost panel -->
  <div id="cost-panel">
    <div class="cost-header">
      <span class="cost-title">📊 今月の概算使用量</span>
      <span class="cost-amount" id="cost-display">¥0 <span>/ ¥1,000</span></span>
    </div>
    <div class="cost-bar-wrap">
      <div class="cost-bar ok" id="cost-bar" style="width:0%"></div>
    </div>
    <div class="cost-labels">
      <span>¥0</span><span>¥500</span><span>¥1,000</span>
    </div>
    <div class="cost-alert" id="cost-alert">⚠️ 月間予算 ¥1,000 を超えました</div>
    <span class="cost-reset" onclick="resetCost()">今月分をリセット</span>
  </div>

  <div id="char-switcher"></div>

  <div id="messages">
    <div id="typing"><span></span><span></span><span></span></div>
  </div>

  <div id="input-wrap">
    <div id="input-toolbar">
      <button class="tool-btn" onclick="insertAsterisk()" title="*行動・心情* を挿入">＊ アクション</button>
      <button class="tool-btn narrator-btn" onclick="requestNarrator()" title="AIにナレーションを挿入させる">📖 ナレーター</button>
    </div>
    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="メッセージを入力…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>

  if (!name || !key) { err.classList.add('show'); return; }
  err.classList.remove('show');
  playerName = name; apiKey = key;

  // 名前とAPIキーを保存
  try { localStorage.setItem('ai_chat_auth', JSON.stringify({playerName: name, apiKey: key})); } catch(e){}

  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (saved.histories) histories = saved.histories;
  } catch(e){}

  loadCost();
  buildSwitcher();
  switchChar(0);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

// ── Cost ──────────────────────────────────────────────
function loadCost() {
  try {
    const saved = JSON.parse(localStorage.getItem(COST_KEY) || '{}');
    const now = monthKey();
    if (saved.month === now) {
      costState = saved;
    } else {
      costState = { month: now, yen: 0 };
    }
  } catch(e){ costState = { month: monthKey(), yen: 0 }; }
  renderCost();
}
function monthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}`;
}
function addCost(inputTokens, outputTokens) {
  const yen = (inputTokens * YEN_PER_IN + outputTokens * YEN_PER_OUT) * USD_TO_YEN;
  costState.yen += yen;
  costState.month = monthKey();
  try { localStorage.setItem(COST_KEY, JSON.stringify(costState)); } catch(e){}
  renderCost();
}
function renderCost() {
  const yen  = costState.yen;
  const pct  = Math.min(yen / BUDGET_YEN * 100, 100);
  const bar  = document.getElementById('cost-bar');
  const disp = document.getElementById('cost-display');
  const alert= document.getElementById('cost-alert');

  disp.innerHTML = `¥${yen.toFixed(1)} <span>/ ¥${BUDGET_YEN.toLocaleString()}</span>`;
  bar.style.width = pct + '%';
  bar.className = 'cost-bar ' + (pct >= 100 ? 'over' : pct >= 70 ? 'warn' : 'ok');
  alert.classList.toggle('show', yen >= BUDGET_YEN);
}
function resetCost() {
  if (!confirm('今月の使用量をリセットしますか？')) return;
  costState = { month: monthKey(), yen: 0 };
  try { localStorage.setItem(COST_KEY, JSON.stringify(costState)); } catch(e){}
  renderCost();
  showToast('使用量をリセットしました');
}
function toggleCost() {
  document.getElementById('cost-panel').classList.toggle('open');
}

// ── Switcher ──────────────────────────────────────────
function buildSwitcher() {
  const sw = document.getElementById('char-switcher');
  sw.innerHTML = '';
  CHARACTERS.forEach((c,i) => {
    const chip = document.createElement('div');
    const isActive = i===activeChar;
    const isLocked = !c.unlocked;
    chip.className = 'char-chip' + (isActive?' active':'') + (isLocked?' locked':'');
    const avDiv = document.createElement('div'); avDiv.className='chip-av';
    if (isLocked) {
      avDiv.innerHTML = '🔒';
    } else {
      avDiv.innerHTML = c.avatar ? `<img src="${c.avatar}" alt="${c.name}">` : DEFAULT_ICONS[i]??'👤';
    }
    const lbl = document.createElement('span'); lbl.textContent = isLocked ? '???' : c.name;
    chip.appendChild(avDiv); chip.appendChild(lbl);
    chip.onclick = ()=>{ switchChar(i); toggleSwitcher(false); };
    sw.appendChild(chip);
  });
}
function toggleSwitcher(force) {
  const sw = document.getElementById('char-switcher');
  if (force===false){ sw.classList.remove('open'); return; }
  sw.classList.toggle('open');
}
function switchChar(idx) {
  // check unlocked
  if (!CHARACTERS[idx].unlocked) {
    showToast(`${CHARACTERS[idx].name} はまだ登場していません`);
    return;
  }
  activeChar = idx;
  const c = CHARACTERS[idx];
  const avEl = document.getElementById('header-avatar');
  avEl.innerHTML = c.avatar ? `<img src="${c.avatar}" alt="${c.name}">` : DEFAULT_ICONS[idx]??'👤';
  document.getElementById('header-name').textContent = c.name;
  if (!histories[idx]) histories[idx] = [];
  renderMessages();
  buildSwitcher();
  // show intro if first time
  if (!introShown[idx] && histories[idx].length === 0) {
    showIntro(idx);
    introShown[idx] = true;
  }
  document.getElementById('msg-input').focus();
}

function unlockCharacter(idx) {
  CHARACTERS[idx].unlocked = true;
  buildSwitcher();
  showToast(`${CHARACTERS[idx].name} が登場しました！`);
}

// ── Messages ──────────────────────────────────────────
function renderMessages() {
  const container = document.getElementById('messages');
  const typing    = document.getElementById('typing');
  container.innerHTML = '';
  container.appendChild(typing);
  (histories[activeChar]||[]).forEach(m => {
    if (m.role === 'narrator') {
      appendNarrator(m.content, false);
    } else {
      appendBubble(m.role, m.content, false);
    }
  });
  scrollBottom();
}

// *text* → <span class="emote">text</span>
function renderContent(text) {
  const escaped = String(text)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return escaped
    .replace(/\*([^*\n]+)\*/g, '<span class="emote">*$1*</span>')
    .replace(/\n/g,'<br>');
}

function appendBubble(role, content, animate=true) {
  const container = document.getElementById('messages');
  const typing    = document.getElementById('typing');
  const c = CHARACTERS[activeChar];

  const div = document.createElement('div');
  div.className = `msg ${role==='user'?'user':'ai'}`;
  if (!animate) div.style.animation='none';

  const av = document.createElement('div'); av.className='msg-av';
  if (role==='user') { av.style.background='transparent'; av.style.border='none'; }
  else if (c.avatar) av.innerHTML=`<img src="${c.avatar}" alt="${c.name}">`;
  else av.textContent = DEFAULT_ICONS[activeChar]??'👤';

  const inner = document.createElement('div'); inner.className='msg-inner';
  inner.innerHTML = `
    <div class="msg-name">${esc(role==='user'?playerName:c.name)}</div>
    <div class="msg-bubble">${renderContent(content)}</div>`;

  div.appendChild(av); div.appendChild(inner);
  container.insertBefore(div, typing);
  scrollBottom();
}

function appendNarrator(content, animate=true) {
  const container = document.getElementById('messages');
  const typing    = document.getElementById('typing');
  const div = document.createElement('div');
  div.className = 'msg narrator';
  if (!animate) div.style.animation='none';
  div.innerHTML = `<div class="msg-inner"><div class="msg-bubble">${renderContent(content)}</div></div>`;
  container.insertBefore(div, typing);
  scrollBottom();
}

function scrollBottom() { const c=document.getElementById('messages'); c.scrollTop=c.scrollHeight; }
function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Send ──────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value=''; autoResize(input);

  const idx = activeChar;
  if (!histories[idx]) histories[idx]=[];
  histories[idx].push({role:'user', content:text});
  appendBubble('user', text);
  saveState();

  showTyping(true);
  try {
    const {reply, inputTokens, outputTokens} = await callClaude(idx, 'chat');
    showTyping(false);
    histories[idx].push({role:'assistant', content:reply});
    appendBubble('assistant', reply);
    addCost(inputTokens, outputTokens);
    saveState();
  } catch(e) {
    showTyping(false);
    histories[idx].pop();
    saveState();
    showToast('エラー: '+e.message);
  }
}

// ── Narrator button ───────────────────────────────────
async function requestNarrator() {
  const idx = activeChar;
  if (!histories[idx]) histories[idx]=[];

  showTyping(true);
  try {
    const {reply, inputTokens, outputTokens} = await callClaude(idx, 'narrator');
    showTyping(false);
    // ナレーター発言はhistoriesには追加せずUIのみに表示（会話の流れに影響しないよう）
    // ただしコンテキストのためにassistantとして記録
    histories[idx].push({role:'narrator', content:reply});
    appendNarrator(reply);
    addCost(inputTokens, outputTokens);
    saveState();
  } catch(e) {
    showTyping(false);
    showToast('エラー: '+e.message);
  }
}

// ── * button ─────────────────────────────────────────
function insertAsterisk() {
  const el = document.getElementById('msg-input');
  el.focus();
  const s = el.selectionStart, e2 = el.selectionEnd;
  const selected = el.value.slice(s, e2);
  const insert   = selected ? `*${selected}*` : '**';
  el.value = el.value.slice(0,s) + insert + el.value.slice(e2);
  const pos = selected ? s+insert.length : s+1;
  el.setSelectionRange(pos, pos);
  autoResize(el);
}

function handleKey(e) {
  // Enterは改行のみ。送信はボタンで行う
}
function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ── Claude API ────────────────────────────────────────
async function callClaude(idx, mode='chat') {
  const c = CHARACTERS[idx];

  // ナレーター用の会話履歴（narratorロールをassistantに変換してAPIに送る）
  const apiMessages = (histories[idx]||[])
    .filter(m => m.role !== 'narrator')
    .map(m => ({ role: m.role, content: m.content }));

  let system;
  if (mode === 'narrator') {
    system = `あなたは物語のナレーターです。現在の会話の流れを踏まえて、場面・状況・雰囲気を描写する短い地の文を書いてください。

【現在のキャラクター】${c.name}
【会話相手】${playerName}
【キャラクター設定】${c.plot}

【ルール】
- 三人称視点で、小説や視覚的ノベルのような地の文を書いてください
- 2〜4文程度の短さで、情景・心情・雰囲気を描写してください
- セリフは含めず、描写のみにしてください
- 日本語で書いてください`;

    // ナレーターはシステムプロンプトのみで判断させる（最後の一言だけ渡す）
    const lastFew = apiMessages.slice(-4);
    const res = await fetchAPI(system, lastFew.length ? lastFew : [{role:'user',content:'（会話開始直前）'}]);
    return res;
  }

  system = `あなたは「${c.name}」というキャラクターです。以下の設定に従って会話してください。

【キャラクター設定】
${fillUser(c.plot)}

【会話相手】
相手の名前は「${playerName}」です。
キャラクターの設定内で{{user}}と書かれているところはすべて「${playerName}」に読み替えてください。

【返答形式】
- セリフに加えて、心情・表情・動作などを *斜体* で自然に挿入してください
  例: *少し照れながら* 「そんなこと言われたら困るよ…」*目を逸らす*
- 感情表現は自然な範囲で使い、多すぎないようにしてください
- AIやClaudeであることは絶対に明かさないでください
- 過去の会話を踏まえて返答してください
- チャットらしい自然なテンポで`;

  return await fetchAPI(system, apiMessages);
}

function fillUser(text) {
  return text.replace(/\{\{user\}\}/g, playerName);
}

function showIntro(idx) {
  if (idx === 0) {
    // Ranka intro
    appendNarrator(fillUser('*ある日の午後、{{user}}と蘭香の暮らすマンション。{{user}}の部屋でゴミ箱を物色している蘭香がいた。*'));
    setTimeout(() => {
      appendBubble('assistant', fillUser('*丸まったティッシュを鼻に押し当てながら*\nはぁ.....//// おにぃ////\nすっごい濃い匂いするよぉ....////'));
      histories[0].push({role:'assistant', content: fillUser('*丸まったティッシュを鼻に押し当てながら*\nはぁ.....//// おにぃ////\nすっごい濃い匂いするよぉ....////')});
      saveState();
    }, 600);
    setTimeout(() => {
      appendBubble('assistant', fillUser('あたまばかになりゅ....////\nんっ....//// おにぃしゅき////'));
      histories[0].push({role:'assistant', content: fillUser('あたまばかになりゅ....////\nんっ....//// おにぃしゅき////')});
      saveState();
    }, 1400);
  }
}

async function fetchAPI(system, messages) {
  const res = await fetch(API_URL, {
    method:'POST',
    mode:'cors',
    credentials:'omit',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-request-direct-browser-access':'true',
    },
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      system,
      messages,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error?.message||`HTTP ${res.status}`);
  }
  const data = await res.json();
  const reply = data.content.map(b=>b.text||'').join('');
  const inputTokens  = data.usage?.input_tokens  || 0;
  const outputTokens = data.usage?.output_tokens || 0;
  return {reply, inputTokens, outputTokens};
}

// ── Storage ───────────────────────────────────────────
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({histories})); } catch(e){}
}
function clearChat() {
  const name = CHARACTERS[activeChar].name;
  if (!confirm(`${name}との会話履歴を削除しますか？`)) return;
  histories[activeChar]=[];
  saveState(); renderMessages();
  showToast('履歴を削除しました');
}

// ── UI helpers ────────────────────────────────────────
function showTyping(show) {
  document.getElementById('typing').classList.toggle('show',show);
  if (show) scrollBottom();
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
// ── Auto-login on page load ──────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  try {
    const auth = JSON.parse(localStorage.getItem('ai_chat_auth') || '{}');
    if (auth.playerName && auth.apiKey) {
      // 自動入力して即ログイン
      playerName = auth.playerName;
      apiKey = auth.apiKey;
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (saved.histories) histories = saved.histories;
      } catch(e){}
      loadCost();
      buildSwitcher();
      switchChar(0);
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
    }
  } catch(e){}
});
</script>
